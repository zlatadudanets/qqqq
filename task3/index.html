<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3efe7;  /* цвет рисовой бумаги */
            font-family: 'Noto Serif SC', 'Noto Serif JP', 'Times New Roman', '游明朝', 'Yu Mincho', Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 10% 30%, rgba(140, 100, 70, 0.05) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        /* свиток-контейнер */
        .scroll-form {
            max-width: 680px;
            width: 100%;
            background: rgba(250, 245, 235, 0.85);
            backdrop-filter: blur(0px);
            border-left: 1px solid #dacbb8;
            border-right: 1px solid #dacbb8;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,250,240,0.6);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: #6a4e2e;
            text-align: center;
            margin-bottom: 1.8rem;
            padding-bottom: 0.6rem;
            border-bottom: 0.5px solid #e2d5c4;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            font-family: inherit;
        }

        /* восточная точка-акцент у заголовка */
        h1::before {
            content: "・";
            margin-right: 10px;
            color: #b87c4f;
            font-weight: 300;
        }
        h1::after {
            content: "・";
            margin-left: 10px;
            color: #b87c4f;
            font-weight: 300;
        }

        /* группы полей */
        .field-group {
            margin-bottom: 1.4rem;
        }

        .field-group label:first-child {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #8b694c;
            margin-bottom: 0.4rem;
            font-weight: 400;
            text-transform: uppercase;
            font-family: 'Noto Serif SC', 'Noto Serif JP', serif;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem 0.8rem;
            background: #fefaf5;
            border: 1px solid #e2d5c4;
            font-family: inherit;
            font-size: 0.9rem;
            color: #4a3924;
            transition: all 0.2s;
            outline: none;
            border-radius: 0px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #b28b6f;
            background: #ffffff;
            box-shadow: none;
        }

        /* радио и чекбоксы */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 0.3rem;
        }

        .radio-group label, .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            color: #6a4e2e;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.3px;
        }

        input[type="radio"], input[type="checkbox"] {
            width: auto;
            accent-color: #b87c4f;
            margin: 0;
        }

        select[multiple] {
            height: 150px;
            background: #fefaf5;
        }

        select[multiple] option {
            padding: 0.3rem 0.5rem;
            margin: 2px 0;
            font-size: 0.85rem;
        }

        select[multiple] option:checked {
            background: #e8ddd0 linear-gradient(0deg, #dccbb8 0%, #dccbb8 100%);
            color: #4a2e1a;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        /* восточная кнопка */
        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid #b28b6f;
            padding: 0.8rem;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #6a4e2e;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.8rem;
            background: rgba(210, 180, 140, 0.05);
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background: #e8ddd0;
            border-color: #8b694c;
            color: #3e2a1a;
            letter-spacing: 4px;
        }

        /* маленькая печать */
        .hanko {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.65rem;
            color: #b28b6f;
            letter-spacing: 2px;
            font-family: monospace;
            border-top: 0.5px solid #e2d5c4;
            padding-top: 1.2rem;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .scroll-form {
                padding: 1.2rem;
            }
            h1 {
                font-size: 1.4rem;
                letter-spacing: 2px;
            }
            .radio-group {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="scroll-form">
    <h1>Анкета</h1>

    <form action="form.cgi" method="POST">
        <div class="field-group">
            <label>ФИО</label>
            <input type="text" name="name">
        </div>

        <div class="field-group">
            <label>Телефон</label>
            <input type="tel" name="phone">
        </div>

        <div class="field-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="field-group">
            <label>Дата рождения</label>
            <input type="date" name="birthdate">
        </div>

        <div class="field-group">
            <label>Пол</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male"> Мужской</label>
                <label><input type="radio" name="gender" value="female"> Женский</label>
            </div>
        </div>

        <div class="field-group">
            <label>Любимый язык программирования</label>
            <select name="languages[]" multiple size="5">
                <option value="1">Pascal</option>
                <option value="2">C</option>
                <option value="3">C++</option>
                <option value="4">JavaScript</option>
                <option value="5">PHP</option>
                <option value="6">Python</option>
                <option value="7">Java</option>
                <option value="8">Haskell</option>
                <option value="9">Clojure</option>
                <option value="10">Prolog</option>
                <option value="11">Scala</option>
                <option value="12">Go</option>
            </select>
        </div>

        <div class="field-group">
            <label>Биография</label>
            <textarea name="bio"></textarea>
        </div>

        <div class="field-group">
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="contract">
                    С контрактом ознакомлен
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit">Сохранить</button>
    </form>

    <div class="hanko">⦿ 礼</div>
</div>
</body>
</html>
